<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>adaid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg1:#0f172a;--bg2:#1e293b;--card:rgba(255,255,255,.08);--line:rgba(255,255,255,.12);--text:#f8fafc;--muted:#cbd5e1;--accent:#38bdf8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);background:radial-gradient(circle at top,#1e293b, #0f172a 55%);min-height:100vh}
a{text-decoration:none;color:inherit}
nav{display:flex;justify-content:space-between;align-items:center;padding:24px 40px}
.brand{font-weight:800;letter-spacing:.08em}
.nav-links{display:flex;gap:12px}
.nav-links a{padding:10px 14px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.04);font-size:14px}
.container{max-width:1100px;margin:0 auto;padding:10px 24px 80px}
.hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 20px 60px}
.avatar{width:132px;height:132px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,.15);box-shadow:0 20px 60px rgba(0,0,0,.35);background:#334155}
.hero h1{font-size:44px;margin-top:20px;font-weight:800}
.tagline{font-size:18px;color:var(--muted);margin-top:10px;line-height:1.7;max-width:700px}
.socials{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:28px}
.socials a{padding:12px 18px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.04));border:1px solid var(--line);transition:.2s;font-weight:600}
.socials a:hover,.game-card:hover{transform:translateY(-4px)}
.section-title{font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:#94a3b8;margin-bottom:18px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.game-card{display:block;background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:22px;overflow:hidden;transition:.2s}
.card-thumb,.card-thumb-placeholder{width:100%;aspect-ratio:16/9;background:#1e293b;display:flex;align-items:center;justify-content:center;object-fit:cover}
.card-body{padding:18px}
.card-title{font-size:18px;font-weight:700;margin-bottom:8px}
.card-desc{font-size:14px;color:var(--muted);line-height:1.6}
.status{color:var(--muted);padding:20px}
.footer{margin-top:60px;text-align:center;color:#94a3b8;font-size:14px}
@media(max-width:700px){nav{padding:18px 18px}.hero h1{font-size:34px}.tagline{font-size:16px}}
</style>
</head>
<body>
<nav>
<a href="index.html" class="brand">ADAID</a>
<div class="nav-links">
<a href="https://x.com/indie_adaid" target="_blank">X</a>
<a href="https://adaid.itch.io/" target="_blank">itch.io</a>
</div>
</nav>
<main class="container">
<section class="hero">
<img class="avatar" src="profile.jpg" alt="프로필 사진" onerror="this.style.display='none'">
<h1>adaid</h1>
<p class="tagline">혼자서 게임을 만드는 인디 개발자.<br>작지만 오래 기억에 남는 경험을 만듭니다.</p>
<div class="socials">
<a href="https://x.com/indie_adaid" target="_blank">𝕏 팔로우</a>
<a href="https://adaid.itch.io/" target="_blank">itch.io 작품 보기</a>
<a href="mailto:you@example.com">이메일</a>
</div>
</section>
<section id="games">
<p class="section-title">Games</p>
<div class="games-grid" id="games-grid"><p class="status">불러오는 중...</p></div>
</section>
<p class="footer">© 2026 adaid Portfolio</p>
</main>
<script>
async function loadGames(){const grid=document.getElementById('games-grid');try{const res=await fetch('games.json');if(!res.ok)throw new Error();const games=await res.json();if(!games.length){grid.innerHTML='<p class="status">아직 등록된 게임이 없습니다.</p>';return;}grid.innerHTML=games.map(g=>`<a class="game-card" href="game.html?id=${encodeURIComponent(g.id)}">${g.thumbnail?`<img class="card-thumb" src="${g.thumbnail}" alt="${g.title}" loading="lazy">`:`<div class="card-thumb-placeholder">No Image</div>`}<div class="card-body"><p class="card-title">${g.title}</p>${g.description?`<p class="card-desc">${g.description}</p>`:''}</div></a>`).join('')}catch(e){grid.innerHTML='<p class="status">games.json을 불러올 수 없습니다.</p>'}}
loadGames();
</script>
</body>
</html>
