<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>adaid</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #888888;
      --border: #e5e5e5;
      --hover-bg: #f5f5f5;
      --accent: #111111;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .nav-name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-decoration: none;
      color: var(--fg);
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.875rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--fg); }

    /* HERO */
    .hero {
      padding: 5rem 2rem 4rem;
      max-width: 680px;
    }

    .hero h1 {
      font-size: 2rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* GAMES SECTION */
    .section {
      padding: 0 2rem 5rem;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .game-card {
      text-decoration: none;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .game-card:hover {
      border-color: var(--fg);
    }

    .game-card:hover .card-thumb {
      opacity: 0.85;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: var(--hover-bg);
      transition: opacity 0.15s;
    }

    .card-thumb-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--hover-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 0.75rem;
    }

    .card-body {
      padding: 1rem;
    }

    .card-title {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .card-desc {
      font-size: 0.8125rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* LOADING / ERROR */
    .status {
      color: var(--muted);
      font-size: 0.875rem;
      padding: 2rem 0;
    }

    @media (max-width: 600px) {
      nav { padding: 1.25rem 1.25rem; }
      .hero { padding: 3rem 1.25rem 2.5rem; }
      .hero h1 { font-size: 1.5rem; }
      .section { padding: 0 1.25rem 3rem; }
      .games-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-name" href="index.html">adaid</a>
  <ul class="nav-links">
    <li><a href="https://x.com/indie_adaid" target="_blank" rel="noopener">X</a></li>
    <li><a href="https://adaid.itch.io/" target="_blank" rel="noopener">itch.io</a></li>
  </ul>
</nav>

<main>
  <section class="hero">
    <h1>인디 게임 개발자</h1>
    <p>혼자서 게임을 만듭니다.<br>작지만 의미 있는 경험을 추구합니다.</p>
  </section>

  <section class="section">
    <p class="section-title">Games</p>
    <div class="games-grid" id="games-grid">
      <p class="status">불러오는 중...</p>
    </div>
  </section>
</main>

<script>
  async function loadGames() {
    const grid = document.getElementById('games-grid');
    try {
      const res = await fetch('games.json');
      if (!res.ok) throw new Error('games.json not found');
      const games = await res.json();

      if (games.length === 0) {
        grid.innerHTML = '<p class="status">아직 등록된 게임이 없습니다.</p>';
        return;
      }

      grid.innerHTML = games.map(g => `
        <a class="game-card" href="game.html?id=${encodeURIComponent(g.id)}">
          ${g.thumbnail
            ? `<img class="card-thumb" src="${g.thumbnail}" alt="${g.title}" loading="lazy" />`
            : `<div class="card-thumb-placeholder">No image</div>`
          }
          <div class="card-body">
            <p class="card-title">${g.title}</p>
            ${g.description ? `<p class="card-desc">${g.description}</p>` : ''}
          </div>
        </a>
      `).join('');
    } catch (e) {
      grid.innerHTML = '<p class="status">games.json을 불러올 수 없습니다.</p>';
    }
  }

  loadGames();
</script>

</body>
</html>
