<!-- index.html -->

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>adaid</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>

<nav>
  <a href="index.html" class="brand">ADAID</a>
  <button class="share-btn" onclick="openQR()">공유</button>
</nav>

<div class="qr-overlay" id="qr-overlay" onclick="closeQR()">
  <div class="qr-modal" onclick="event.stopPropagation()">
    <button class="qr-close" onclick="closeQR()">✕</button>
    <img src="QR.jpg" alt="QR 코드">
  </div>
</div>

<main class="container">

<section class="hero">

  <img class="avatar"
       src="profile.png"
       alt="프로필 사진"
       onerror="this.style.display='none'">

  <h1>어데이드</h1>

  <p class="tagline">
    <b>'게임'</b>을 통해 인상적인 경험을 <b>'당신'</b>에게.<br>
    만들고 싶은 게임을 만듭니다.
  </p>

  <div class="socials">

    <a href="https://x.com/indie_adaid" target="_blank">
      <img src="icons/x.png" alt="">
      X
    </a>

    <a href="https://adaid.itch.io/" target="_blank">
      <img src="icons/itchio.svg" alt="">
      itch.io
    </a>

    <a href="https://www.postype.com/@indie-adaid" target="_blank">
      <img src="icons/postype.png" alt="">
      포스타입
    </a>

  </div>

</section>

<section id="games">

  <p class="section-title">Games</p>

  <div class="games-grid" id="games-grid">
    <p class="status">불러오는 중...</p>
  </div>

</section>

<p class="footer">© 2026 adaid Portfolio</p>

</main>

<script>
async function loadGames(){

  const grid = document.getElementById('games-grid');

  try{

    const res = await fetch('games.json');
    if(!res.ok) throw new Error();

    const games = await res.json();

    if(!games.length){
      grid.innerHTML =
        '<p class="status">아직 등록된 게임이 없습니다.</p>';
      return;
    }

    const LANG_FLAGS = { ko:'kr', en:'us', ja:'jp', zh:'cn', fr:'fr', de:'de', es:'es' };

    grid.innerHTML = games.map(g => `
      <a class="game-card"
         href="game.html?id=${encodeURIComponent(g.id)}">

        ${g.thumbnail
          ? `<img class="card-thumb"
                 src="${g.thumbnail}"
                 alt="${g.title}"
                 loading="lazy">`
          : `<div class="card-thumb-placeholder">No Image</div>`
        }

        <div class="card-body">
          <p class="card-title">${g.title}</p>

          ${g.description
            ? `<div class="card-tags">${g.description.split(',').map(t => `<span class="card-tag">${t.trim()}</span>`).join('')}</div>`
            : ''
          }

          ${g.tagline
            ? `<p class="card-tagline">${g.tagline}</p>`
            : ''
          }

          ${g.languages && g.languages.length
            ? `<p class="card-langs">${g.languages.map(l => `<span class="fi fi-${LANG_FLAGS[l] ?? l}" title="${l}"></span>`).join('')}</p>`
            : ''
          }
        </div>

      </a>
    `).join('');

    const cards = document.querySelectorAll('.game-card');

    cards.forEach((card, i) => {
      card.style.animationDelay = `${i * 0.08}s`;
      card.classList.add('show');
    });

  }catch(e){

    grid.innerHTML =
      '<p class="status">games.json을 불러올 수 없습니다.</p>';
  }
}

loadGames();

function openQR(){
  document.getElementById('qr-overlay').classList.add('active');
}
function closeQR(){
  document.getElementById('qr-overlay').classList.remove('active');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeQR(); });
</script>

</body>
</html>
