<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>adaid</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="brand">ADAID</a>
</nav>

<main class="container">

  <section class="hero">
    <img class="avatar" src="profile.png" alt="프로필 사진"
         onerror="this.style.display='none'">

    <h1>adaid</h1>

    <p class="tagline">
      혼자서 게임을 만드는 인디 개발자.<br>
      작지만 오래 기억에 남는 경험을 만듭니다.
    </p>

    <div class="socials">

    <a href="https://x.com/indie_adaid" target="_blank">
        <img src="icons/x.png" alt="">
        X
    </a>

    <a href="https://adaid.itch.io/" target="_blank">
        <img src="icons/itchio.svg" alt="">
        itch.io
    </a>

    <a href="https://www.postype.com/@indie-adaid" target="_blank">
        <img src="icons/postype.png" alt="">
        포스타입
    </a>
    </div>
  </section>

  <section id="games">
    <p class="section-title">Games</p>

    <div class="games-grid" id="games-grid">
      <p class="status">불러오는 중...</p>
    </div>
  </section>

  <p class="footer">© 2026 adaid Portfolio</p>

</main>

<script>
async function loadGames(){
  const grid = document.getElementById('games-grid');

  try{
    const res = await fetch('games.json');
    if(!res.ok) throw new Error();

    const games = await res.json();

    if(!games.length){
      grid.innerHTML =
        '<p class="status">아직 등록된 게임이 없습니다.</p>';
      return;
    }

    grid.innerHTML = games.map(g => `
      <a class="game-card" href="game.html?id=${encodeURIComponent(g.id)}">

        ${g.thumbnail
          ? `<img class="card-thumb"
                 src="${g.thumbnail}"
                 alt="${g.title}"
                 loading="lazy">`
          : `<div class="card-thumb-placeholder">No Image</div>`
        }

        <div class="card-body">
          <p class="card-title">${g.title}</p>

          ${g.description
            ? `<p class="card-desc">${g.description}</p>`
            : ''
          }
        </div>

      </a>
    `).join('');

  }catch(e){
    grid.innerHTML =
      '<p class="status">games.json을 불러올 수 없습니다.</p>';
  }
}

loadGames();
</script>

</body>
</html>
