<!-- index.html -->

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>adaid</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>

<nav>
  <a href="index.html" class="brand">ADAID</a>
  <div class="nav-right">
    <button class="share-btn" data-i18n="share" onclick="openQR()">공유</button>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="ko">한</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ja">日</button>
    </div>
  </div>
</nav>

<div class="qr-overlay" id="qr-overlay" onclick="closeQR()">
  <div class="qr-modal" onclick="event.stopPropagation()">
    <button class="qr-close" onclick="closeQR()">✕</button>
    <img src="QR.jpg" alt="QR 코드">
  </div>
</div>

<main class="container">

<section class="hero">

  <img class="avatar"
       src="profile.png"
       alt="프로필 사진"
       onerror="this.style.display='none'">

  <h1 data-i18n="hero_name">어데이드</h1>

  <p class="tagline" data-i18n="hero_tagline">
    <b>'게임'</b>을 통해 인상적인 경험을 <b>'당신'</b>에게.<br>
    만들고 싶은 게임을 만듭니다.
  </p>

  <div class="socials">

    <a href="https://x.com/indie_adaid" target="_blank">
      <img src="icons/x.png" alt="">
      X
    </a>

    <a href="https://adaid.itch.io/" target="_blank">
      <img src="icons/itchio.svg" alt="">
      itch.io
    </a>

    <a href="https://www.postype.com/@indie-adaid" target="_blank">
      <img src="icons/postype.png" alt="">
      <span data-i18n="social_postype">포스타입</span>
    </a>

    <a href="https://www.game-ping.kr/users/어데이드" target="_blank">
      <img src="icons/gameping.png" alt="">
      <span data-i18n="social_gameping">게임핑</span>
    </a>

    <a href="https://www.youtube.com/@어데이드" target="_blank">
      <img src="icons/youtube.png" alt="">
      YouTube
    </a>

    <a href="https://adaid.notion.site/About-29784d0908ea802b823dc92c72b74e0b" target="_blank">
      <img src="icons/notion.svg" alt="" style="filter:brightness(0) invert(1);">
      <span data-i18n="social_notion">노션</span>
    </a>

  </div>

</section>

<section id="games">

  <p class="section-title" data-i18n="section_games">Games</p>

  <div class="games-grid" id="games-grid">
    <p class="status" data-i18n="loading">불러오는 중...</p>
  </div>

</section>

<p class="footer" data-i18n="footer">© 2026 adaid Portfolio</p>

</main>

<script>
const SUPPORTED_LANGS = ['ko', 'en', 'ja'];
const LANG_FLAGS = { ko:'kr', en:'us', ja:'jp', zh:'cn', fr:'fr', de:'de', es:'es' };

let currentLang = 'ko';
let strings = {};

function detectLang() {
  const saved = localStorage.getItem('lang');
  if (saved && SUPPORTED_LANGS.includes(saved)) return saved;
  const browser = navigator.language.slice(0, 2);
  return SUPPORTED_LANGS.includes(browser) ? browser : 'ko';
}

async function changeLang(lang) {
  const res = await fetch(`lang/${lang}.json`);
  strings = await res.json();
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.lang = lang;
  applyStrings();
  loadGames();
}

function applyStrings() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (strings[key] !== undefined) el.innerHTML = strings[key];
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === currentLang);
  });
}

function loc(game, field) {
  return game[`${field}_${currentLang}`] || game[field] || '';
}

async function loadGames() {
  const grid = document.getElementById('games-grid');
  grid.innerHTML = `<p class="status">${strings.loading || '...'}</p>`;

  try {
    const res = await fetch('games.json');
    if (!res.ok) throw new Error();

    const games = await res.json();

    if (!games.length) {
      grid.innerHTML = `<p class="status">${strings.no_games || ''}</p>`;
      return;
    }

    grid.innerHTML = games.map(g => `
      <a class="game-card"
         href="game.html?id=${encodeURIComponent(g.id)}">

        <div class="card-thumb-wrap">
          ${g.thumbnail
            ? `<img class="card-thumb"
                   src="${g.thumbnail}"
                   alt="${loc(g, 'title')}"
                   loading="lazy">`
            : `<div class="card-thumb-placeholder">No Image</div>`
          }
          ${g.award ? `<img class="card-award" src="icons/award.svg" alt="award">` : ''}
        </div>

        <div class="card-body">
          <p class="card-title">${loc(g, 'title')}</p>

          ${loc(g, 'description')
            ? `<div class="card-tags">${loc(g, 'description').split(',').map(t => `<span class="card-tag">${t.trim()}</span>`).join('')}</div>`
            : ''
          }

          ${loc(g, 'tagline')
            ? `<p class="card-tagline">${loc(g, 'tagline')}</p>`
            : ''
          }

          ${g.languages && g.languages.length
            ? `<p class="card-langs">${g.languages.map(l => `<span class="fi fi-${LANG_FLAGS[l] ?? l}" title="${l}"></span>`).join('')}</p>`
            : ''
          }
        </div>

      </a>
    `).join('');

    document.querySelectorAll('.game-card').forEach((card, i) => {
      card.style.animationDelay = `${i * 0.08}s`;
      card.classList.add('show');
    });

  } catch(e) {
    grid.innerHTML = `<p class="status">${strings.load_error || 'Error'}</p>`;
  }
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => changeLang(btn.dataset.lang));
});

changeLang(detectLang());

function openQR(){
  document.getElementById('qr-overlay').classList.add('active');
}
function closeQR(){
  document.getElementById('qr-overlay').classList.remove('active');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeQR(); });
</script>

</body>
</html>
