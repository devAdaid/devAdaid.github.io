<!-- game.html (썸네일 없이 클릭해야 WebGL 실행) -->

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>adaid</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="brand">ADAID</a>
  <div class="nav-right">
    <div class="lang-switcher" id="lang-switcher"></div>
  </div>
</nav>

<div class="wrap">

  <article>

    <div class="md" id="content">
      <p class="status">불러오는 중...</p>
    </div>

    <a href="index.html" class="back-home" data-i18n="back_home">
      ← 목록으로 돌아가기
    </a>

  </article>

</div>

<script>
marked.setOptions({ breaks: true });

const SUPPORTED_LANGS = ['ko', 'en', 'ja'];
const LANG_LABELS = { ko: '한', en: 'EN', ja: '日' };

let currentLang = 'ko';
let strings = {};

function detectLang() {
  const saved = localStorage.getItem('lang');
  if (saved && SUPPORTED_LANGS.includes(saved)) return saved;
  const browser = navigator.language.slice(0, 2);
  return SUPPORTED_LANGS.includes(browser) ? browser : 'ko';
}

async function changeLang(lang) {
  const res = await fetch(`lang/${lang}.json`);
  strings = await res.json();
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.lang = lang;
  renderLangSwitcher();
  applyStrings();

  const params = new URLSearchParams(location.search);
  await loadGame(params.get('id'));
}

function renderLangSwitcher() {
  const switcher = document.getElementById('lang-switcher');
  switcher.innerHTML = SUPPORTED_LANGS
    .map(l => `<button class="lang-btn${l === currentLang ? ' active' : ''}" data-lang="${l}">${LANG_LABELS[l]}</button>`)
    .join('');
}

function applyStrings() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (strings[key] !== undefined) el.innerHTML = strings[key];
  });
}

async function loadGame(id) {
  const content = document.getElementById('content');

  if (!id) {
    content.innerHTML = `<p class="status">${strings.game_id_missing || 'No game ID.'}</p>`;
    return;
  }

  content.innerHTML = `<p class="status">${strings.loading || '...'}</p>`;

  const paths = currentLang !== 'ko'
    ? [`games/${id}.${currentLang}.md`, `games/${id}.md`]
    : [`games/${id}.md`];

  let text = null;
  for (const path of paths) {
    const res = await fetch(path);
    if (res.ok) { text = await res.text(); break; }
  }

  if (!text) {
    content.innerHTML = `<p class="status">${strings.game_not_found || 'Not found.'}</p>`;
    return;
  }

  content.innerHTML = marked.parse(text);

  const h1 = content.querySelector('h1');
  if (h1) document.title = `${h1.textContent} — adaid`;

  replacePlayBlocks();
}

function replacePlayBlocks() {
  const walker = document.createTreeWalker(
    document.getElementById('content'),
    NodeFilter.SHOW_TEXT
  );

  const targets = [];
  while (walker.nextNode()) {
    if (walker.currentNode.nodeValue.includes('[play:')) {
      targets.push(walker.currentNode);
    }
  }

  targets.forEach(node => {
    const match = node.nodeValue.match(/\[play:(.*?)\]/);
    if (!match) return;

    const wrap = document.createElement('div');
    wrap.className = 'game-embed';
    wrap.dataset.src = match[1].trim();
    wrap.innerHTML = `
      <div class="game-launch">
        <div class="game-launch-icon">▶</div>
        <div class="game-launch-title">${strings.webgl_title || 'WebGL'}</div>
        <div class="game-launch-sub">${strings.webgl_sub || ''}</div>
        <button type="button">${strings.webgl_play || 'Play'}</button>
      </div>
    `;
    node.parentNode.replaceChild(wrap, node);
  });
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.game-launch button');
  if (!btn) return;
  const box = btn.closest('.game-embed');
  if (!box) return;
  box.innerHTML = `<iframe src="${box.dataset.src}" loading="lazy" allowfullscreen></iframe>`;
});

async function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const lang = detectLang();

  const res = await fetch(`lang/${lang}.json`);
  strings = await res.json();

  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.lang = lang;

  renderLangSwitcher();
  applyStrings();
  await loadGame(id);

  document.getElementById('lang-switcher').addEventListener('click', e => {
    const btn = e.target.closest('.lang-btn');
    if (btn) changeLang(btn.dataset.lang);
  });
}

init();
</script>

</body>
</html>
