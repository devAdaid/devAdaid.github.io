<!-- game.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>adaid</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="brand">ADAID</a>
</nav>

<div class="wrap">

  <div class="breadcrumb">
    <a href="index.html">홈</a>
    /
    <span id="breadcrumb-title">게임</span>
  </div>

  <article>

    <div class="md" id="content">
      <p class="status">불러오는 중...</p>
    </div>

    <a href="index.html" class="back-home">
      ← 목록으로 돌아가기
    </a>

  </article>

</div>

<script>
marked.setOptions({
  breaks:true
});

async function loadGame(){

  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  const content = document.getElementById('content');

  if(!id){
    content.innerHTML =
      '<p class="status">게임 ID가 없습니다.</p>';
    return;
  }

  try{

    const res = await fetch(`games/${id}.md`);
    if(!res.ok) throw new Error();

    const text = await res.text();

    content.innerHTML = marked.parse(text);

    const h1 = content.querySelector('h1');

    if(h1){
      document.title = `${h1.textContent} — adaid`;
      document.getElementById('breadcrumb-title').textContent =
        h1.textContent;
    }

  }catch(e){

    content.innerHTML =
      `<p class="status">games/${id}.md 파일을 찾을 수 없습니다.</p>`;
  }
}

loadGame();
</script>

</body>
</html>
