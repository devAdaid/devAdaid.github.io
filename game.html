<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>adaid</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg1:#0f172a;--bg2:#1e293b;--card:rgba(255,255,255,.08);--line:rgba(255,255,255,.12);--text:#f8fafc;--muted:#cbd5e1;--accent:#38bdf8}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);background:radial-gradient(circle at top,#1e293b,#0f172a 55%);min-height:100vh}
a{text-decoration:none;color:inherit}
nav{display:flex;justify-content:space-between;align-items:center;padding:24px 40px}
.brand{font-weight:800;letter-spacing:.08em}
.nav-links{display:flex;gap:12px}.nav-links a{padding:10px 14px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.04);font-size:14px}
.wrap{max-width:920px;margin:0 auto;padding:0 24px 80px}
.breadcrumb{margin:8px 0 24px;color:#94a3b8;font-size:14px}.breadcrumb a:hover{color:#fff}
article{background:var(--card);border:1px solid var(--line);backdrop-filter:blur(12px);border-radius:28px;padding:38px}
.status{color:var(--muted)}
.md h1{font-size:42px;line-height:1.2;margin-bottom:18px}
.md h2{font-size:28px;margin:42px 0 14px}.md h3{font-size:22px;margin:30px 0 10px}
.md p,.md li{font-size:17px;line-height:1.9;color:#e2e8f0;margin-bottom:14px}
.md ul,.md ol{padding-left:24px;margin-bottom:16px}
.md strong{color:#fff}.md a{color:#7dd3fc}
.md img{max-width:100%;border-radius:18px;margin:20px 0;border:1px solid var(--line)}
.md hr{border:none;border-top:1px solid var(--line);margin:34px 0}
.md code{background:rgba(255,255,255,.08);padding:.2em .45em;border-radius:8px;font-size:14px}
.md pre{background:#020617;padding:18px;border-radius:18px;overflow:auto;margin:18px 0;border:1px solid var(--line)}
.md pre code{background:none;padding:0}
.md iframe{width:100%;min-height:520px;border:1px solid var(--line);border-radius:20px;margin:24px 0;background:#dddddd}
.back-home{display:inline-flex;gap:8px;align-items:center;margin-top:28px;padding:12px 18px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid var(--line)}
@media(max-width:700px){nav{padding:18px}.wrap{padding:0 16px 60px}article{padding:24px;border-radius:22px}.md h1{font-size:30px}.md h2{font-size:24px}.md p,.md li{font-size:16px}.md iframe{min-height:320px}}
</style>
</head>
<body>
<nav>
<a href="index.html" class="brand">Adaid</a>
</nav>
<div class="wrap">
<div class="breadcrumb"><a href="index.html">홈</a> / <span id="breadcrumb-title">게임</span></div>
<article>
<div class="md" id="content"><p class="status">불러오는 중...</p></div>
<a href="index.html" class="back-home">← 목록으로 돌아가기</a>
</article>
</div>
<script>
marked.setOptions({breaks:true});
async function loadGame(){const params=new URLSearchParams(location.search);const id=params.get('id');const content=document.getElementById('content');if(!id){content.innerHTML='<p class="status">게임 ID가 없습니다.</p>';return;}try{const res=await fetch(`games/${id}.md`);if(!res.ok)throw new Error();const text=await res.text();content.innerHTML=marked.parse(text);const h1=content.querySelector('h1');if(h1){document.title=`${h1.textContent} — adaid`;document.getElementById('breadcrumb-title').textContent=h1.textContent;}}catch(e){content.innerHTML=`<p class="status">games/${id}.md 파일을 찾을 수 없습니다.</p>`;}}
loadGame();
</script>
</body>
</html>
