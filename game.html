<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>adaid</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #888888;
      --border: #e5e5e5;
      --hover-bg: #f5f5f5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .nav-name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-decoration: none;
      color: var(--fg);
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.875rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--fg); }

    /* BREADCRUMB */
    .breadcrumb {
      padding: 1.25rem 2rem 0;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .breadcrumb a {
      color: var(--muted);
      text-decoration: none;
    }

    .breadcrumb a:hover { color: var(--fg); }

    /* ARTICLE */
    article {
      max-width: 760px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    /* MARKDOWN STYLES */
    .md h1 {
      font-size: 1.875rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 1.5rem;
    }

    .md h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .md h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
    }

    .md p {
      font-size: 0.9375rem;
      line-height: 1.75;
      color: #333;
      margin-bottom: 1rem;
    }

    .md ul, .md ol {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }

    .md li {
      font-size: 0.9375rem;
      line-height: 1.75;
      color: #333;
      margin-bottom: 0.25rem;
    }

    .md a {
      color: var(--fg);
    }

    .md img {
      max-width: 100%;
      border-radius: 4px;
      margin: 1rem 0;
    }

    .md hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .md code {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.8125rem;
      background: var(--hover-bg);
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }

    .md pre {
      background: var(--hover-bg);
      border-radius: 4px;
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }

    .md pre code {
      background: none;
      padding: 0;
    }

    /* WEBGL iframe */
    .md iframe {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      margin: 1.5rem 0;
      display: block;
    }

    /* STATUS */
    .status {
      color: var(--muted);
      font-size: 0.875rem;
      padding: 3rem 0;
    }

    @media (max-width: 600px) {
      nav { padding: 1.25rem 1.25rem; }
      .breadcrumb { padding: 1rem 1.25rem 0; }
      article { padding: 2rem 1.25rem 4rem; }
      .md h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-name" href="index.html">adaid</a>
  <ul class="nav-links">
    <li><a href="https://x.com/indie_adaid" target="_blank" rel="noopener">X</a></li>
    <li><a href="https://adaid.itch.io/" target="_blank" rel="noopener">itch.io</a></li>
  </ul>
</nav>

<div class="breadcrumb">
  <a href="index.html">홈</a> &nbsp;/&nbsp; <span id="breadcrumb-title">게임</span>
</div>

<article>
  <div class="md" id="content">
    <p class="status">불러오는 중...</p>
  </div>
</article>

<script>
  marked.setOptions({ breaks: true });

  async function loadGame() {
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const content = document.getElementById('content');

    if (!id) {
      content.innerHTML = '<p class="status">게임 ID가 없습니다. <a href="index.html">홈으로</a></p>';
      return;
    }

    try {
      const res = await fetch(`games/${id}.md`);
      if (!res.ok) throw new Error('not found');
      const text = await res.text();
      content.innerHTML = marked.parse(text);

      // 페이지 타이틀 및 빵 부스러기 업데이트
      const h1 = content.querySelector('h1');
      if (h1) {
        document.title = `${h1.textContent} — adaid`;
        document.getElementById('breadcrumb-title').textContent = h1.textContent;
      }
    } catch (e) {
      content.innerHTML = `<p class="status">games/${id}.md 파일을 찾을 수 없습니다. <a href="index.html">홈으로</a></p>`;
    }
  }

  loadGame();
</script>

</body>
</html>
